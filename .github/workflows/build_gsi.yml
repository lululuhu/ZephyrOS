name: Build ZephyrOS GSI

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'AOSP tag (default android-13.0.0_r83)'
        required: false
        default: 'android-13.0.0_r83'
      target:
        description: 'Build target (aosp_arm64-userdebug / aosp_x86_64-userdebug)'
        required: false
        default: 'aosp_arm64-userdebug'
      enable_ccache:
        description: 'Use ccache (recommended)'
        required: false
        default: 'true'
  push:
    branches:
      - main
      - master
    paths:
      - 'vendor/zephyr/**'
      - 'packages/apps/ZephyrParts/**'
      - 'manifest/**'
      - '.github/workflows/build_gsi.yml'
      - 'build/**'

env:
  # GitHub Actions runner 用户对 /mnt 无写权限, 改用 workspace 子目录
  CCACHE_DIR: ${{ github.workspace }}/ccache
  AOSP_ROOT: ${{ github.workspace }}/aosp
  # 降到 3G (从 5G) — 首次构建无缓存命中, ccache 反而占磁盘
  CCACHE_MAXSIZE: 3G
  USE_CCACHE: 1
  TZ: Asia/Shanghai

concurrency:
  group: zephyr-gsi-${{ github.ref }}-${{ github.event.inputs.target || 'aosp_arm64-userdebug' }}
  cancel-in-progress: true

jobs:
  build:
    name: Build GSI
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout ZephyrOS overlay
        uses: actions/checkout@v4
        with:
          path: zephyr-overlay

      - name: Show runner resources
        run: |
          echo "=== CPU ==="
          nproc
          echo "=== Memory ==="
          free -h
          echo "=== Disk (before) ==="
          df -h /
          df -h /mnt

      - name: Free up disk space
        run: |
          bash zephyr-overlay/build/optimize_disk.sh
          df -h /
          df -h /mnt

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git-core gnupg flex bison gperf build-essential \
            zip curl zlib1g-dev gcc-multilib g++-multilib \
            libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
            libx11-dev lib32z-dev ccache libgl1-mesa-dev \
            libxml2-utils xsltproc unzip python3 python3-pip \
            repo rsync
          # libncurses5/libtinfo5 在 Ubuntu 22.04 已移除, 安装兼容包
          sudo apt-get install -y -qq libncurses5-compat libtinfo5-compat 2>/dev/null || true
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Configure git
        run: |
          git config --global user.name "ZephyrOS CI"
          git config --global user.email "ci@zephyros.local"
          git config --global color.ui false

      - name: Restore ccache
        if: ${{ github.event.inputs.enable_ccache != 'false' }}
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ github.event.inputs.target || 'aosp_arm64-userdebug' }}-${{ github.event.inputs.android_version || 'android-13.0.0_r83' }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ github.event.inputs.target || 'aosp_arm64-userdebug' }}-${{ github.event.inputs.android_version || 'android-13.0.0_r83' }}-

      - name: Setup build environment
        run: |
          bash zephyr-overlay/build/setup_env.sh \
            "${{ github.event.inputs.android_version || 'android-13.0.0_r83' }}" \
            "${{ env.AOSP_ROOT }}" \
            "$GITHUB_WORKSPACE/zephyr-overlay/manifest/zephyr.xml"

      - name: Upload setup log (for debugging runner crashes)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: setup-log-${{ github.sha }}
          path: /tmp/setup_env.log
          if-no-files-found: warn
          retention-days: 7

      - name: Apply ZephyrOS overlay
        run: |
          # 把当前仓库的内容铺到 AOSP 树对应路径
          # 注意: packages/apps/Lawnchair 由 repo sync 拉取, 不覆盖
          # 先创建目标目录 (AOSP 源码默认无 vendor/ 顶层目录, rsync 不会
          # 递归创建多层不存在的父目录)
          mkdir -p ${{ env.AOSP_ROOT }}/vendor/zephyr
          mkdir -p ${{ env.AOSP_ROOT }}/packages/apps
          mkdir -p ${{ env.AOSP_ROOT }}/frameworks
          rsync -a --exclude='.git' --exclude='Lawnchair' \
            zephyr-overlay/packages/apps/ ${{ env.AOSP_ROOT }}/packages/apps/
          rsync -a --exclude='.git' zephyr-overlay/vendor/zephyr/ ${{ env.AOSP_ROOT }}/vendor/zephyr/
          # frameworks/ 目录中的 ZephyrSystemUIHooks 模块暂未启用,
          # 且引用 SystemUI-core (AOSP 13 中可能不存在), 不复制到 AOSP 树
          echo "ZephyrOS overlay applied:"
          ls -la ${{ env.AOSP_ROOT }}/vendor/zephyr/
          # 确保 frameworks/ 中未启用的模块不会残留
          rm -rf ${{ env.AOSP_ROOT }}/frameworks/base/packages/SystemUI/ZephyrHooks 2>/dev/null || true
          echo "Lawnchair source:"
          ls ${{ env.AOSP_ROOT }}/packages/apps/Lawnchair/ 2>/dev/null | head -5 || echo "WARN: Lawnchair not synced"
          # 清理 VTS 测试用例目录 (避免 vts/vndk 等模块未定义错误)
          # GSI 构建不需要任何 VTS 测试, 全部删除
          echo "Removing all VTS testcase directories..."
          rm -rf ${{ env.AOSP_ROOT }}/test/vts-testcase 2>/dev/null || true
          rm -rf ${{ env.AOSP_ROOT }}/test/vts 2>/dev/null || true
          find ${{ env.AOSP_ROOT }} -type d -name "vts" -exec rm -rf {} + 2>/dev/null || true
          echo "VTS cleanup done."
          echo "Done."

      - name: Generate original boot animation
        run: |
          # ZephyrOS 原创开机动画: 通过 Python 生成 PNG 帧并打包 zip
          pip install Pillow --quiet
          cd ${{ env.AOSP_ROOT }}/vendor/zephyr/bootanimation
          python3 generate_bootanimation.py
          ls -lh bootanimation.zip

      - name: Download OFL fonts
        run: |
          # 下载 OFL 开源字体 (Roboto / Varela Round / Noto Sans CJK)
          bash ${{ env.AOSP_ROOT }}/vendor/zephyr/fonts/download_fonts.sh

      - name: Apply framework patches
        run: |
          # 应用 ZephyrOS framework 补丁 (status bar + gesture controller)
          # 注意: 占位符 patch 会跳过, 不影响构建 (功能通过 overlay 实现)
          cd ${{ env.AOSP_ROOT }}
          for p in frameworks/base/patches/*.patch; do
            [ -f "$p" ] || continue
            echo "[PATCH] Applying: $p"
            if git apply --check "$p" 2>/dev/null; then
              git apply --verbose "$p" 2>&1 | tail -3
            else
              echo "[WARN] $p skipped (context mismatch or placeholder — using overlay fallback)"
            fi
          done

      - name: Lunch target
        working-directory: ${{ env.AOSP_ROOT }}
        run: |
          source build/envsetup.sh
          # 诊断: 列出可用的 release config (AOSP 14 lunch 三段式: product-release-variant)
          echo "=== Available release configs in build/release/ ==="
          ls build/release/ 2>/dev/null || echo "(no build/release/ dir)"
          echo "=== Available lunch targets (matching aosp_arm64) ==="
          lunch --print-all 2>/dev/null | grep -i "aosp_arm64" | head -20 || true
          echo "=== Attempting lunch ==="
          lunch ${{ github.event.inputs.target || 'aosp_arm64-userdebug' }}
          echo "TARGET_PRODUCT=$TARGET_PRODUCT"
          echo "TARGET_BUILD_VARIANT=$TARGET_BUILD_VARIANT"
          echo "TARGET_RELEASE=$TARGET_RELEASE"

      - name: Build GSI system image
        working-directory: ${{ env.AOSP_ROOT }}
        env:
          TARGET_LUNCH: ${{ github.event.inputs.target || 'aosp_arm64-userdebug' }}
        run: |
          bash $GITHUB_WORKSPACE/zephyr-overlay/build/build_gsi.sh
        timeout-minutes: 300

      - name: Sign GSI
        working-directory: ${{ env.AOSP_ROOT }}
        run: |
          bash $GITHUB_WORKSPACE/zephyr-overlay/build/sign_gsi.sh

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          BUILD_OUT=${{ env.AOSP_ROOT }}/out/target/product/*/system.img
          for f in $BUILD_OUT; do
            [ -f "$f" ] && cp -v "$f" artifacts/$(basename "$f")
          done
          # 附带构建信息
          cat > artifacts/build_info.txt <<EOF
          ZephyrOS GSI Build
          ==================
          Android: ${{ github.event.inputs.android_version || 'android-13.0.0_r83' }}
          Target:  ${{ github.event.inputs.target || 'aosp_arm64-userdebug' }}
          Commit:  ${{ github.sha }}
          Branch:  ${{ github.ref }}
          Built:   $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF
          ls -la artifacts/

      - name: Upload GSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: zephyr-gsi-${{ github.event.inputs.target || 'aosp_arm64-userdebug' }}-${{ github.sha }}
          path: artifacts/*
          retention-days: 14
          compression-level: 0

      - name: Cleanup workspace
        if: always()
        run: |
          sudo rm -rf ${{ env.AOSP_ROOT }}/out 2>/dev/null || true
          df -h /
